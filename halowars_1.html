<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaloWars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Orbitron', sans-serif; }
  #gameContainer { position: relative; }
  canvas { display: block; border: 1px solid #0ff3; box-shadow: 0 0 40px #0ff4, 0 0 80px #00f2; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  #topBar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: linear-gradient(180deg, rgba(0,0,30,0.9) 0%, transparent 100%); }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .statLabel { font-size: 9px; color: #0ff8; letter-spacing: 2px; text-transform: uppercase; }
  .statValue { font-size: 18px; font-weight: 900; color: #0ff; text-shadow: 0 0 10px #0ff; font-family: 'Share Tech Mono'; }
  #healthBar { width: 160px; height: 8px; background: #011; border: 1px solid #0f04; border-radius: 4px; overflow: hidden; }
  #healthFill { height: 100%; background: linear-gradient(90deg, #0f0, #0ff); border-radius: 4px; transition: width 0.1s; box-shadow: 0 0 8px #0f0; }
  #shieldBar { width: 160px; height: 6px; background: #001; border: 1px solid #00f4; border-radius: 3px; overflow: hidden; margin-top: 3px; }
  #shieldFill { height: 100%; background: linear-gradient(90deg, #00f, #0ff); border-radius: 3px; transition: width 0.1s; box-shadow: 0 0 8px #00f; }
  #weaponDisplay { display: flex; gap: 8px; align-items: center; }
  .weaponSlot { width: 36px; height: 36px; border: 1px solid #0f04; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; background: rgba(0,255,0,0.05); }
  .weaponSlot.active { border-color: #0ff; background: rgba(0,255,255,0.1); box-shadow: 0 0 8px #0ff4; }
  #levelDisplay { font-size: 22px; font-weight: 900; color: #ff0; text-shadow: 0 0 15px #ff0; }
  #scoreDisplay { font-size: 22px; font-weight: 900; color: #f0f; text-shadow: 0 0 15px #f0f; font-family: 'Share Tech Mono'; }
  #bossBar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; display: none; }
  #bossLabel { text-align: center; font-size: 11px; color: #f004; letter-spacing: 3px; margin-bottom: 4px; text-shadow: 0 0 8px #f00; }
  #bossHealthBar { width: 100%; height: 14px; background: #100; border: 1px solid #f004; border-radius: 7px; overflow: hidden; }
  #bossHealthFill { height: 100%; background: linear-gradient(90deg, #f00, #f80, #ff0); border-radius: 7px; transition: width 0.1s; box-shadow: 0 0 10px #f004; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,10,0.92); z-index: 10; }
  #overlay h1 { font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #0ff, #f0f, #ff0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; letter-spacing: 4px; margin-bottom: 8px; }
  #overlay .sub { font-size: 13px; color: #0ff8; letter-spacing: 6px; margin-bottom: 40px; }
  #overlay .controls { font-family: 'Share Tech Mono'; font-size: 12px; color: #888; line-height: 2; text-align: center; margin-bottom: 30px; }
  #overlay .controls span { color: #0ff; }
  #startBtn { padding: 14px 50px; background: transparent; border: 2px solid #0ff; color: #0ff; font-family: 'Orbitron'; font-size: 14px; font-weight: 700; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 0 20px #0ff4; }
  #startBtn:hover { background: #0ff2; box-shadow: 0 0 40px #0ff8; transform: scale(1.05); }
  #levelUpMsg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 36px; font-weight: 900; color: #ff0; text-shadow: 0 0 20px #ff0; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; letter-spacing: 4px; }
  #weaponMsg { position: absolute; top: 60%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; font-weight: 700; color: #0ff; text-shadow: 0 0 15px #0ff; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; letter-spacing: 2px; }
  #missileCount { font-size: 12px; color: #f80; font-family: 'Share Tech Mono'; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="topBar">
      <div class="stat">
        <span class="statLabel">Health</span>
        <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
        <div id="shieldBar"><div id="shieldFill" style="width:100%"></div></div>
      </div>
      <div class="stat">
        <span class="statLabel">Weapons</span>
        <div id="weaponDisplay">
          <div class="weaponSlot active" id="w0">🔵</div>
          <div class="weaponSlot" id="w1">🟡</div>
          <div class="weaponSlot" id="w2">🔴</div>
          <div class="weaponSlot" id="w3">🚀</div>
        </div>
        <span id="missileCount">Missiles: 0</span>
      </div>
      <div class="stat">
        <span class="statLabel">Level</span>
        <div id="levelDisplay">1</div>
      </div>
      <div class="stat">
        <span class="statLabel">Score</span>
        <div id="scoreDisplay">000000</div>
      </div>
    </div>
    <div id="bossBar">
      <div id="bossLabel">⚠ BOSS INCOMING ⚠</div>
      <div id="bossHealthBar"><div id="bossHealthFill" style="width:100%"></div></div>
    </div>
  </div>
  <div id="levelUpMsg">LEVEL UP!</div>
  <div id="weaponMsg">NEW WEAPON UNLOCKED!</div>
  <div id="overlay">
    <h1>HALOWARS</h1>
    <div class="sub">DEEP SPACE COMBAT</div>
    <div class="controls">
      <span>ARROW KEYS</span> or <span>WASD</span> — Move<br>
      <span>SPACE</span> — Shoot &nbsp;&nbsp; <span>X</span> — Missiles<br>
      <span>1/2/3</span> — Switch Weapons
    </div>
    <button id="startBtn" onclick="startGame()">LAUNCH MISSION</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// ── State ──────────────────────────────────────────────────────────
let state = 'menu';
let score = 0, level = 1, frame = 0;
let keys = {};
let stars = [], particles = [], bullets = [], enemyBullets = [], enemies = [], powerups = [];
let boss = null;
let bossPhase = false;
let enemySpawnTimer = 0;
let bossSpawnScore = [800, 2000];
let bossDefeated = [false, false];
let gameOver = false;
let win = false;

const player = {
  x: 120, y: H/2, w: 44, h: 28,
  speed: 4.5, health: 100, maxHealth: 100,
  shield: 0, maxShield: 100,
  weapon: 0, weapons: [true, false, false, false],
  missiles: 0, shootCooldown: 0, missileCooldown: 0,
  invincible: 0, xp: 0, xpNext: 100
};

// ── Stars ──────────────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H,
      size: Math.random()*2.5, speed: 0.3 + Math.random()*2,
      bright: Math.random() });
  }
}

// ── Draw helpers ───────────────────────────────────────────────────
function drawStars() {
  stars.forEach(s => {
    s.x -= s.speed;
    if (s.x < 0) { s.x = W; s.y = Math.random()*H; }
    const a = 0.4 + s.bright * 0.6;
    ctx.fillStyle = `rgba(${180+s.bright*75},${180+s.bright*75},255,${a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size/2, 0, Math.PI*2); ctx.fill();
  });
}

function drawPlayer() {
  const p = player;
  if (p.invincible > 0 && Math.floor(frame/4)%2) return;
  ctx.save();
  ctx.translate(p.x, p.y);
  // Engine glow
  const eg = ctx.createRadialGradient(-p.w/2-5, 0, 1, -p.w/2-5, 0, 18);
  eg.addColorStop(0, 'rgba(0,150,255,0.9)');
  eg.addColorStop(1, 'rgba(0,50,255,0)');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.ellipse(-p.w/2-5, 0, 18, 8, 0, 0, Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle = '#1a3a6a';
  ctx.beginPath();
  ctx.moveTo(p.w/2, 0);
  ctx.lineTo(-p.w/2+8, -p.h/2);
  ctx.lineTo(-p.w/2, -p.h/2+4);
  ctx.lineTo(-p.w/2-2, 0);
  ctx.lineTo(-p.w/2, p.h/2-4);
  ctx.lineTo(-p.w/2+8, p.h/2);
  ctx.closePath(); ctx.fill();
  // Cockpit
  const cg = ctx.createRadialGradient(p.w/4, 0, 1, p.w/4, 0, 10);
  cg.addColorStop(0, 'rgba(0,255,255,0.9)');
  cg.addColorStop(1, 'rgba(0,100,200,0.3)');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.ellipse(p.w/4, 0, 10, 7, 0, 0, Math.PI*2); ctx.fill();
  // Wing accents
  ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -p.h/2); ctx.lineTo(-p.w/3, -p.h/2+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, p.h/2); ctx.lineTo(-p.w/3, p.h/2-8); ctx.stroke();
  // Shield ring
  if (p.shield > 0) {
    ctx.strokeStyle = `rgba(0,100,255,${p.shield/p.maxShield*0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowBlur = 12; ctx.shadowColor = b.color;
  ctx.fillStyle = b.color;
  if (b.type === 'laser') {
    ctx.fillRect(b.x, b.y - 2, b.w, 4);
  } else if (b.type === 'spread') {
    ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'plasma') {
    const pg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 8);
    pg.addColorStop(0, '#fff'); pg.addColorStop(0.4, b.color); pg.addColorStop(1, 'transparent');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
  } else if (b.type === 'missile') {
    ctx.fillStyle = '#f80';
    ctx.beginPath(); ctx.moveTo(b.x+12, b.y); ctx.lineTo(b.x, b.y-4); ctx.lineTo(b.x, b.y+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff0'; ctx.beginPath(); ctx.arc(b.x+8, b.y, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  if (e.type === 'fighter') {
    ctx.fillStyle = '#6a1a2a';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, 0); ctx.lineTo(e.w/2-8, -e.h/2);
    ctx.lineTo(e.w/2, 0); ctx.lineTo(e.w/2-8, e.h/2); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#f44'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke();
  } else if (e.type === 'creature') {
    ctx.fillStyle = '#2a5a1a';
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 + frame*0.03;
      ctx.beginPath(); ctx.ellipse(Math.cos(a)*12, Math.sin(a)*12, 6, 3, a, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#4f0'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'bomber') {
    ctx.fillStyle = '#3a1a6a';
    ctx.beginPath(); ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#80f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, e.w/2+4, 0, Math.PI*2); ctx.stroke();
  }
  // Health bar
  const hpw = e.w; const hpx = -hpw/2;
  ctx.fillStyle = '#200'; ctx.fillRect(hpx, -e.h/2-10, hpw, 4);
  ctx.fillStyle = `hsl(${(e.health/e.maxHealth)*120},100%,50%)`;
  ctx.fillRect(hpx, -e.h/2-10, hpw*(e.health/e.maxHealth), 4);
  ctx.restore();
}

function drawBoss(b) {
  ctx.save(); ctx.translate(b.x, b.y);
  const t = frame * 0.02;
  if (b.level === 1) {
    // Level 1 boss: armored cruiser
    ctx.fillStyle = '#4a1a0a';
    ctx.beginPath();
    ctx.moveTo(-b.w/2, 0); ctx.lineTo(-b.w/4, -b.h/2);
    ctx.lineTo(b.w/4, -b.h/3); ctx.lineTo(b.w/2, 0);
    ctx.lineTo(b.w/4, b.h/3); ctx.lineTo(-b.w/4, b.h/2); ctx.closePath(); ctx.fill();
    // Cannon ports
    for (let i = -1; i <= 1; i++) {
      ctx.fillStyle = '#f40';
      ctx.beginPath(); ctx.arc(b.w/3, i*20, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff0';
      ctx.beginPath(); ctx.arc(b.w/3, i*20, 4, 0, Math.PI*2); ctx.fill();
    }
    // Shield ring
    ctx.strokeStyle = `rgba(255,80,0,${0.4+Math.sin(t)*0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, b.w/2+10, 0, Math.PI*2); ctx.stroke();
  } else {
    // Level 2 boss: alien dreadnought
    ctx.fillStyle = '#1a0a4a';
    ctx.beginPath(); ctx.ellipse(0, 0, b.w/2, b.h/2, 0, 0, Math.PI*2); ctx.fill();
    // Tentacles
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2 + t;
      const len = b.w/2 + 20 + Math.sin(t*3+i)*10;
      ctx.strokeStyle = `hsl(${280+i*10},80%,50%)`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*b.w/3, Math.sin(a)*b.h/3);
      ctx.lineTo(Math.cos(a)*len, Math.sin(a)*len);
      ctx.stroke();
    }
    ctx.fillStyle = '#80f';
    ctx.beginPath(); ctx.ellipse(0, 0, b.w/3, b.h/3, 0, 0, Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#f0f';
    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(5, -5, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(7, -4, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.shadowBlur = 6; ctx.shadowColor = p.color;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.shadowBlur = 10; ctx.shadowColor = '#f40';
  ctx.fillStyle = '#f84';
  ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  ctx.save(); ctx.translate(p.x, p.y);
  ctx.rotate(frame * 0.05);
  const colors = { health: '#0f0', shield: '#00f', weapon: '#f0f', missile: '#f80', xp: '#ff0' };
  const icons  = { health: '♥', shield: '🛡', weapon: '⚡', missile: '🚀', xp: '★' };
  ctx.strokeStyle = colors[p.type]; ctx.lineWidth = 2;
  ctx.shadowBlur = 15; ctx.shadowColor = colors[p.type];
  ctx.strokeRect(-12, -12, 24, 24);
  ctx.fillStyle = colors[p.type];
  ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(icons[p.type], 0, 1);
  ctx.restore();
}

// ── Spawn ──────────────────────────────────────────────────────────
function spawnEnemy() {
  const types = level === 1
    ? ['fighter','fighter','creature']
    : ['fighter','creature','bomber','bomber'];
  const type = types[Math.floor(Math.random()*types.length)];
  const configs = {
    fighter: { w:36, h:22, health:20, maxHealth:20, speed:1.8+Math.random()*1, score:50, shootRate:120 },
    creature: { w:32, h:32, health:30, maxHealth:30, speed:1.2+Math.random()*0.8, score:80, shootRate:90 },
    bomber:   { w:42, h:30, health:50, maxHealth:50, speed:1.0+Math.random()*0.5, score:120, shootRate:60 }
  };
  const cfg = { ...configs[type] };
  enemies.push({
    type, ...cfg,
    x: W + cfg.w,
    y: 60 + Math.random()*(H-120),
    vx: -cfg.speed, vy: (Math.random()-0.5)*0.8,
    shootTimer: Math.floor(Math.random()*cfg.shootRate)
  });
}

function spawnBoss(lvl) {
  bossPhase = true;
  enemies = [];
  const cfg = lvl === 1
    ? { w:120, h:90, health:400, maxHealth:400, x: W-80, speed:1.2, phase:0 }
    : { w:140, h:110, health:700, maxHealth:700, x: W-100, speed:1.5, phase:0 };
  boss = { level:lvl, ...cfg, y:H/2, vy:1.2, shootTimer:0, enraged:false };
  document.getElementById('bossBar').style.display = 'block';
  const label = lvl === 1 ? '⚠ GUARDIAN DREADNOUGHT ⚠' : '⚠ VOID LEVIATHAN ⚠';
  document.getElementById('bossLabel').textContent = label;
}

function spawnParticles(x, y, color, count=12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = 1+Math.random()*4;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      color, size: 2+Math.random()*4, life: 30+Math.random()*30, maxLife: 60 });
  }
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.35) return;
  const types = ['health','shield','xp','xp','missile'];
  const type = types[Math.floor(Math.random()*types.length)];
  powerups.push({ x, y, type, vy: (Math.random()-0.5)*0.5, timer: 300 });
}

// ── Shooting ───────────────────────────────────────────────────────
function playerShoot() {
  const p = player;
  const weapon = p.weapon;
  if (weapon === 0) { // Laser
    bullets.push({ x: p.x+p.w/2, y: p.y, vx: 12, vy: 0, dmg: 10, type: 'laser', w: 20, color: '#0ff' });
  } else if (weapon === 1) { // Spread
    for (let i = -1; i <= 1; i++) {
      bullets.push({ x: p.x+p.w/2, y: p.y, vx: 10, vy: i*2.5, dmg: 8, type: 'spread', color: '#ff0' });
    }
  } else if (weapon === 2) { // Plasma
    bullets.push({ x: p.x+p.w/2, y: p.y, vx: 9, vy: 0, dmg: 25, type: 'plasma', color: '#f0f' });
  }
}

function fireMissile() {
  if (player.missiles <= 0) return;
  player.missiles--;
  updateMissileCount();
  // Find nearest enemy
  let target = boss || enemies.reduce((n,e) => (!n || e.x < n.x) ? e : n, null);
  bullets.push({ x: player.x+player.w/2, y: player.y, vx: 7, vy: 0,
    dmg: 80, type: 'missile', homing: true, target, color: '#f80' });
}

function enemyShoot(e) {
  const angle = Math.atan2(player.y - e.y, player.x - e.x);
  enemyBullets.push({ x: e.x - e.w/2, y: e.y,
    vx: Math.cos(angle)*4, vy: Math.sin(angle)*4 });
}

function bossShoot(b) {
  const patterns = b.enraged ? 3 : 2;
  for (let i = 0; i < patterns; i++) {
    const angle = Math.atan2(player.y - b.y, player.x - b.x) + (i-(patterns-1)/2)*0.25;
    enemyBullets.push({ x: b.x - b.w/2, y: b.y,
      vx: Math.cos(angle)*5, vy: Math.sin(angle)*5 });
  }
}

// ── Collision ──────────────────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 &&
         ay-ah/2 < by+bh/2 && ay+ah/2 > by-bh/2;
}

function hitPlayer(dmg) {
  if (player.invincible > 0) return;
  if (player.shield > 0) {
    player.shield = Math.max(0, player.shield - dmg);
    spawnParticles(player.x, player.y, '#00f', 6);
  } else {
    player.health = Math.max(0, player.health - dmg);
    spawnParticles(player.x, player.y, '#f00', 8);
    player.invincible = 60;
  }
  updateHUD();
  if (player.health <= 0) endGame(false);
}

// ── XP / Level ─────────────────────────────────────────────────────
function addXP(amt) {
  player.xp += amt;
  if (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.xpNext = Math.floor(player.xpNext * 1.5);
    levelUpReward();
  }
}

function levelUpReward() {
  player.health = Math.min(player.maxHealth, player.health + 30);
  player.shield = Math.min(player.maxShield, player.shield + 50);
  showMsg('levelUpMsg', 'LEVEL UP! +SHIELD +HEALTH');
  updateHUD();
}

// ── Powerup collect ────────────────────────────────────────────────
function collectPowerup(p) {
  if (p.type === 'health') { player.health = Math.min(player.maxHealth, player.health+30); showMsg('weaponMsg','+ HEALTH'); }
  if (p.type === 'shield') { player.shield = Math.min(player.maxShield, player.shield+50); showMsg('weaponMsg','+ SHIELD'); }
  if (p.type === 'xp')     { addXP(30); showMsg('weaponMsg','+ XP'); }
  if (p.type === 'missile'){ player.missiles += 3; updateMissileCount(); showMsg('weaponMsg','+ 3 MISSILES'); }
  if (p.type === 'weapon') {
    const next = player.weapons.indexOf(false);
    if (next !== -1) { player.weapons[next] = true; showMsg('weaponMsg', `WEAPON ${next+1} UNLOCKED!`); updateWeaponUI(); }
  }
  updateHUD();
  spawnParticles(p.x, p.y, '#ff0', 10);
}

// ── UI ─────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('healthFill').style.width = (player.health/player.maxHealth*100)+'%';
  document.getElementById('shieldFill').style.width = (player.shield/player.maxShield*100)+'%';
  document.getElementById('scoreDisplay').textContent = String(score).padStart(6,'0');
  document.getElementById('levelDisplay').textContent = level;
}

function updateWeaponUI() {
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('w'+i);
    el.classList.toggle('active', player.weapon === i && player.weapons[i]);
    el.style.opacity = player.weapons[i] ? '1' : '0.3';
  }
}

function updateMissileCount() {
  document.getElementById('missileCount').textContent = 'Missiles: ' + player.missiles;
}

function showMsg(id, text) {
  const el = document.getElementById(id);
  el.textContent = text; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1800);
}

function updateBossBar() {
  if (!boss) return;
  document.getElementById('bossHealthFill').style.width = (boss.health/boss.maxHealth*100)+'%';
}

// ── End / transitions ──────────────────────────────────────────────
function endGame(won) {
  state = 'over';
  win = won;
  const ov = document.getElementById('overlay');
  ov.innerHTML = won
    ? `<h1>VICTORY</h1><div class="sub">SECTOR CLEARED</div>
       <div class="controls">Final Score: <span>${score}</span></div>
       <button id="startBtn" onclick="resetGame()">PLAY AGAIN</button>`
    : `<h1>GAME OVER</h1><div class="sub">SHIP DESTROYED</div>
       <div class="controls">Final Score: <span>${score}</span></div>
       <button id="startBtn" onclick="resetGame()">TRY AGAIN</button>`;
  ov.style.display = 'flex';
}

function advanceLevel() {
  level = 2;
  bossPhase = false;
  boss = null;
  document.getElementById('bossBar').style.display = 'none';
  enemies = []; enemyBullets = []; bullets = []; powerups = [];
  player.health = Math.min(player.maxHealth, player.health + 40);
  player.shield = Math.min(player.maxShield, player.shield + 60);
  player.missiles += 5;
  // Unlock spread weapon
  player.weapons[1] = true;
  updateWeaponUI(); updateHUD(); updateMissileCount();
  showMsg('levelUpMsg', 'LEVEL 2 — NEW SECTOR!');
  setTimeout(() => showMsg('weaponMsg', 'SPREAD SHOT UNLOCKED!'), 1000);
  document.getElementById('levelDisplay').textContent = '2';
}

// ── Main loop ──────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frame++;

  // Player movement
  const p = player;
  if ((keys['ArrowUp']||keys['w']||keys['W']) && p.y > p.h/2+5) p.y -= p.speed;
  if ((keys['ArrowDown']||keys['s']||keys['S']) && p.y < H-p.h/2-5) p.y += p.speed;
  if ((keys['ArrowLeft']||keys['a']||keys['A']) && p.x > p.w/2+5) p.x -= p.speed;
  if ((keys['ArrowRight']||keys['d']||keys['D']) && p.x < W/2) p.x += p.speed;

  // Weapon switch
  if (keys['1'] && player.weapons[0]) { player.weapon=0; updateWeaponUI(); }
  if (keys['2'] && player.weapons[1]) { player.weapon=1; updateWeaponUI(); }
  if (keys['3'] && player.weapons[2]) { player.weapon=2; updateWeaponUI(); }

  // Shoot
  if (p.shootCooldown > 0) p.shootCooldown--;
  if ((keys[' ']||keys['Space']) && p.shootCooldown <= 0) {
    playerShoot();
    p.shootCooldown = p.weapon===2 ? 25 : p.weapon===1 ? 12 : 8;
  }

  // Missiles
  if (p.missileCooldown > 0) p.missileCooldown--;
  if ((keys['x']||keys['X']) && p.missileCooldown <= 0 && p.missiles > 0) {
    fireMissile(); p.missileCooldown = 30;
  }

  if (p.invincible > 0) p.invincible--;
  // Shield regen
  if (frame % 180 === 0 && p.shield < p.maxShield) { p.shield = Math.min(p.maxShield, p.shield+5); updateHUD(); }

  // Bullets
  bullets = bullets.filter(b => {
    if (b.homing && b.target) {
      const tx = b.target.x || 0, ty = b.target.y || 0;
      const a = Math.atan2(ty-b.y, tx-b.x);
      b.vx += Math.cos(a)*0.4; b.vy += Math.sin(a)*0.4;
      const spd = Math.hypot(b.vx,b.vy);
      if (spd > 10) { b.vx = b.vx/spd*10; b.vy = b.vy/spd*10; }
    }
    b.x += b.vx; b.y += b.vy;
    if (b.x > W+20 || b.y < -20 || b.y > H+20) return false;

    // Hit enemies
    for (let i = enemies.length-1; i >= 0; i--) {
      const e = enemies[i];
      if (rectsOverlap(b.x,b.y,b.type==='laser'?b.w:12,10, e.x,e.y,e.w,e.h)) {
        e.health -= b.dmg;
        spawnParticles(b.x, b.y, '#f80', 5);
        if (e.health <= 0) {
          score += e.score; addXP(e.score/5);
          spawnParticles(e.x, e.y, '#f60', 20);
          spawnPowerup(e.x, e.y);
          enemies.splice(i, 1);
          updateHUD();
        }
        if (b.type !== 'laser') return false;
      }
    }
    // Hit boss
    if (boss && rectsOverlap(b.x,b.y,12,10, boss.x,boss.y,boss.w,boss.h)) {
      boss.health -= b.dmg;
      spawnParticles(b.x, b.y, '#ff0', 6);
      updateBossBar();
      if (boss.health <= 0) {
        score += boss.level===1 ? 500 : 1000;
        spawnParticles(boss.x, boss.y, '#ff0', 50);
        spawnParticles(boss.x, boss.y, '#f80', 50);
        bossDefeated[boss.level-1] = true;
        if (boss.level === 1) { advanceLevel(); }
        else { endGame(true); }
        boss = null;
        updateHUD();
      }
      if (boss && boss.health < boss.maxHealth*0.3 && !boss.enraged) {
        boss.enraged = true; boss.speed *= 1.5;
      }
      if (b.type !== 'laser') return false;
    }
    return true;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -10 || b.y < -10 || b.y > H+10) return false;
    if (rectsOverlap(b.x,b.y,8,8, p.x,p.y,p.w-8,p.h-8)) {
      hitPlayer(12); return false;
    }
    return true;
  });

  // Enemies
  if (!bossPhase) {
    enemySpawnTimer++;
    const spawnRate = level===1 ? 90 : 60;
    if (enemySpawnTimer >= spawnRate) { spawnEnemy(); enemySpawnTimer = 0; }
  }

  enemies = enemies.filter(e => {
    e.x += e.vx; e.y += e.vy;
    if (e.y < 30) e.vy = Math.abs(e.vy);
    if (e.y > H-30) e.vy = -Math.abs(e.vy);
    if (e.x < -80) return false;
    // Shoot
    e.shootTimer++;
    if (e.shootTimer >= e.shootRate) { enemyShoot(e); e.shootTimer = 0; }
    // Collide with player
    if (rectsOverlap(e.x,e.y,e.w-8,e.h-8, p.x,p.y,p.w-10,p.h-10)) {
      hitPlayer(20); spawnParticles(e.x,e.y,'#f60',15); return false;
    }
    return true;
  });

  // Boss
  if (boss) {
    boss.y += boss.vy;
    if (boss.y < 60 || boss.y > H-60) boss.vy *= -1;
    boss.x += Math.sin(frame*0.02) * (boss.enraged ? 1.5 : 0.8);
    boss.x = Math.max(W*0.5, Math.min(W-boss.w/2-10, boss.x));
    boss.shootTimer++;
    const shootRate = boss.enraged ? 35 : 55;
    if (boss.shootTimer >= shootRate) { bossShoot(boss); boss.shootTimer = 0; }
    // Collide with player
    if (rectsOverlap(boss.x,boss.y,boss.w-20,boss.h-20, p.x,p.y,p.w-10,p.h-10)) {
      hitPlayer(25);
    }
  }

  // Powerups
  powerups = powerups.filter(pu => {
    pu.x -= 1.5; pu.y += pu.vy;
    pu.timer--;
    if (pu.x < -20 || pu.timer <= 0) return false;
    if (rectsOverlap(pu.x,pu.y,24,24, p.x,p.y,p.w,p.h)) {
      collectPowerup(pu); return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95; return --p.life>0; });

  // Boss spawn trigger
  if (!bossPhase && !bossDefeated[level-1]) {
    if (level===1 && score>=bossSpawnScore[0] && !boss) spawnBoss(1);
    if (level===2 && score>=bossSpawnScore[1] && !boss) spawnBoss(2);
  }
}

function draw() {
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  // Nebula background
  const nb = ctx.createRadialGradient(W*0.7, H*0.3, 0, W*0.7, H*0.3, 300);
  nb.addColorStop(0, 'rgba(20,0,40,0.4)'); nb.addColorStop(1, 'transparent');
  ctx.fillStyle = nb; ctx.fillRect(0,0,W,H);
  const nb2 = ctx.createRadialGradient(W*0.2, H*0.8, 0, W*0.2, H*0.8, 250);
  nb2.addColorStop(0, 'rgba(0,20,40,0.3)'); nb2.addColorStop(1, 'transparent');
  ctx.fillStyle = nb2; ctx.fillRect(0,0,W,H);

  drawStars();
  particles.forEach(drawParticle);
  powerups.forEach(drawPowerup);
  enemies.forEach(drawEnemy);
  if (boss) drawBoss(boss);
  bullets.forEach(drawBullet);
  enemyBullets.forEach(drawEnemyBullet);
  if (state === 'playing') drawPlayer();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  initStars();
}

function resetGame() {
  // Reset all state
  score=0; level=1; frame=0; bossPhase=false; boss=null;
  bossDefeated=[false,false]; enemySpawnTimer=0;
  bullets=[]; enemyBullets=[]; enemies=[]; particles=[]; powerups=[];
  player.x=120; player.y=H/2; player.health=100; player.shield=0;
  player.weapon=0; player.weapons=[true,false,false,false];
  player.missiles=0; player.shootCooldown=0; player.missileCooldown=0;
  player.invincible=0; player.xp=0; player.xpNext=100;
  document.getElementById('bossBar').style.display='none';
  updateHUD(); updateWeaponUI(); updateMissileCount();
  document.getElementById('overlay').style.display='none';
  state='playing';
}

// ── Input ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

initStars();
gameLoop();
</script>
</body>
